apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prime-clone-app
  namespace: argocd
spec:
  project: default
  source:
    # Points cleanly to your active Git repository configuration layout
    repoURL: 'https://github.com/tejaravutla287/POC-6'
    targetRevision: HEAD
    path: k8s
  destination:
    # FIXED: Restored the explicit canonical internal cluster loop API address
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
