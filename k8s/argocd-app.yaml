apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prime-clone-app
  namespace: argocd
spec:
  project: default
  source:
    # FIXED: Replaced template with your exact GitHub repository path
    repoURL: 'https://github.com/tejaravutla287/POC-6'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
